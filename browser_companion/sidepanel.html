<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trunk RAG Companion</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LOCAL-FIRST RAG</p>
          <h1>Trunk RAG</h1>
        </div>
        <button id="healthBtn" type="button" class="icon-btn" title="서버 상태 확인">↻</button>
      </header>

      <section class="status-row" aria-live="polite">
        <span id="statusDot" class="status-dot"></span>
        <span>
          <span id="statusText">연결 확인 전</span>
          <span id="serverMeta" class="server-meta">server profile=-</span>
        </span>
      </section>

      <section class="server-config">
        <label for="serverUrl">Local server</label>
        <div class="inline-control">
          <input id="serverUrl" type="url" value="http://127.0.0.1:8000">
          <button id="saveServerBtn" type="button">Save</button>
        </div>
      </section>

      <section class="page-tools">
        <div class="section-heading">
          <h2>Page Context</h2>
          <button id="capturePageBtn" type="button">Capture</button>
        </div>
        <p id="pageSummary" class="muted">현재 페이지는 명시적으로 Capture를 눌렀을 때만 읽습니다.</p>
        <button id="uploadDraftBtn" type="button" class="secondary-btn" disabled>Upload Draft for Review</button>
      </section>

      <section class="query-panel">
        <div class="section-heading">
          <h2>Ask</h2>
          <select id="qualityMode" aria-label="질의 모드">
            <option value="balanced">Balanced</option>
            <option value="quality">Quality</option>
          </select>
        </div>
        <textarea id="questionInput" rows="4" placeholder="로컬 Trunk RAG에 질문"></textarea>
        <button id="askBtn" type="button" class="primary-btn">Ask Local RAG</button>
      </section>

      <section id="resultPanel" class="result-panel" aria-live="polite"></section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
